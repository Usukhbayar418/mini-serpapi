name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rspec:
    name: RSpec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RSpec tests
        run: bundle exec rspec